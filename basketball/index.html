    <style>
        :root {
            --gold: #C5A55A;
            --gold-bright: #D4B96A;
            --navy: #1B2540;
            --navy-dark: #0F1A2E;
            --navy-light: #243352;
            --bg: #111118;

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {

            background: var(--bg);
            color: var(--text);
            padding-top: 200px;
            padding-bottom: 100px;
        }

        /* ── Sticky Header ── */
        .sticky-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
            box-shadow: 0 4px 24px rgba(0,0,0,0.6);
        }

        .vitals {
            background: var(--gold);
            color: var(--navy-dark);
            text-align: center;
            padding: 8px;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .hero {
            background: var(--navy);
            padding: 18px 20px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            border-bottom: 1px solid var(--card-border);
        }

        h1 {
            font-size: 32px;
            font-weight: 900;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 1;
        }

        .subhead {
            font-size: 13px;
            font-weight: 400;
            color: var(--muted);
            margin: 4px 0 0;
            letter-spacing: 0.5px;
        }

        .program-name {
            color: var(--gold);
            font-weight: 700;
        }

        .btn-contact {
            display: inline-block;
            background: var(--gold);
            color: var(--navy-dark);
            padding: 9px 24px;
            text-decoration: none;
            font-weight: 800;
            border-radius: 50px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.2s;
        }

        .btn-contact:hover {
            background: #fff;
            color: var(--navy-dark);
            transform: scale(1.05);
        }

        /* ── Stats Strip ── */
        .stats-strip {
            display: flex;
            justify-content: center;
            gap: 40px;
            background: var(--navy);
            padding: 14px 25px 20px;
            flex-wrap: wrap;
            border-bottom: 4px solid var(--gold);

        .stat-box { text-align: center; }

        .stat-val {
            font-size: 38px;
            font-weight: 700;
            line-height: 1;
            color: #fff;
        }

        .stat-val.accent { color: var(--gold); }

        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--muted);
            font-weight: 700;
            letter-spacing: 1.5px;
            margin-top: 4px;
        }

        .stat-loading {
            color: var(--muted);
            font-size: 28px;
        }

        /* ── Content ── */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .section-header {
            border-left: 5px solid var(--gold);
            padding-left: 15px;
            margin: 30px 0 24px;
            text-transform: uppercase;
            font-size: 22px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 1px;
        }

        .section-header:first-child { margin-top: 10px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 20px;
        }

        .video-card {
            background: var(--card);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--card-border);
            transition: transform 0.2s, border-color 0.2s;
        }

        .video-card:hover {
            transform: translateY(-4px);
            border-color: var(--gold);
        }

        .vid-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            background: #000;
        }

        .vid-wrapper iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: 0;
        }

        .video-title {
            padding: 12px 14px;
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .loading-msg {
            text-align: center;
            color: var(--muted);
            padding: 40px;
            font-size: 14px;
        }

        /* ── Footer ── */
        .footer {
            position: fixed;
            bottom: 0; left: 0;
            width: 100%;
            background: var(--navy);
            border-top: 1px solid var(--card-border);
            padding: 12px 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
        }

        .footer-content {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .footer-info {
            font-size: 12px;
            color: var(--muted);
            font-weight: 500;
        }

        .footer-info span { margin: 0 8px; color: var(--card-border); }
        .footer-info a { color: #fff; text-decoration: none; transition: 0.2s; }
        .footer-info a:hover { color: var(--gold); }

        .social-icons { display: flex; gap: 15px; }
        .social-icon svg { width: 18px; height: 18px; fill: var(--muted); transition: 0.2s; }
        .social-icon:hover svg { fill: var(--gold); transform: scale(1.15); }

        .copyright { font-size: 9px; color: var(--card-border); margin-top: 8px; }

        /* ── Mobile ── */
        @media (max-width: 768px) {
            body { padding-top: 300px; padding-bottom: 130px; }
            .hero { flex-direction: column; gap: 10px; padding: 14px; }
            h1 { font-size: 24px; }
            .btn-contact { margin: 0; }
            .stats-strip { gap: 20px; padding: 12px; }
            .stat-val { font-size: 28px; }
            .grid { grid-template-columns: 1fr; }
            .footer-content { flex-direction: column; gap: 10px; }
        }

        @media (min-width: 769px) {
            .footer { flex-direction: row; justify-content: center; height: 50px; }
            .copyright { position: absolute; left: 40px; bottom: 18px; margin: 0; }
        }
    </style>
</head>

    <script>
        // ── YouTube Channel RSS Feed ──
        // Videos load dynamically from Enzo's YouTube channel.
        // Upload a new video → it appears here automatically.
        const CHANNEL_ID = 'UCX3fUr2zuSlWaB28TPgZaXA';
        const RSS_PROXY = `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://www.youtube.com/feeds/videos.xml?channel_id=${CHANNEL_ID}`)}`;

        // ── Google Sheets Stats ──
        // Pulls live season averages from the team Google Sheet.
        const SHEET_ID = '1QkuOXoZBgEw9YU4hMWe1UTyIYYYidJOcDyyXLdAlBfs';
        const SHEET_RANGE = 'Sheet1';
        const SHEETS_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_RANGE}`;

        // ── Load YouTube Videos ──
        async function loadVideos() {
            const section = document.getElementById('videos-section');

            try {
                const resp = await fetch(RSS_PROXY);
                const text = await resp.text();
                const parser = new DOMParser();
                const xml = parser.parseFromString(text, 'text/xml');
                const entries = xml.querySelectorAll('entry');

                if (entries.length === 0) throw new Error('No videos found');

                section.innerHTML = '<h2 class="section-header">Game Film</h2>';
                const grid = document.createElement('div');
                grid.className = 'grid';

                entries.forEach(entry => {
                    const videoId = entry.querySelector('videoId').textContent;
                    const title = entry.querySelector('title').textContent;
                    // Strip the repeated "Enzo Fatone 6'0 SG Montverde Academy - " prefix
                    const cleanTitle = title.replace(/Enzo Fatone.*?-\s*/, '').trim() || title;

                    grid.innerHTML += `
                        <div class="video-card">
                            <div class="vid-wrapper">
                                <iframe src="https://www.youtube.com/embed/${videoId}"
                                        allowfullscreen loading="lazy"></iframe>
                            </div>
                            <div class="video-title">${cleanTitle}</div>
                        </div>`;
                });

                section.appendChild(grid);
            } catch (err) {
                console.warn('RSS feed failed, falling back to known videos:', err);
                // Fallback: hardcoded video IDs in case RSS proxy is down
                const fallbackIds = [
                    'ectfW81Zj8w', 'rC7fj8hIJHg', 'HoLt0SSweik', 'pNit5NG-rcw',
                    '8VgNf7sbww8', '4NPoklJOHXw', 'DsK9iBTKqoQ', 'tSx-p15Qft8'
                ];
                section.innerHTML = '<h2 class="section-header">Game Film</h2>';
                const grid = document.createElement('div');
                grid.className = 'grid';
                fallbackIds.forEach(id => {
                    grid.innerHTML += `
                        <div class="video-card">
                            <div class="vid-wrapper">
                                <iframe src="https://www.youtube.com/embed/${id}"
                                        allowfullscreen loading="lazy"></iframe>
                            </div>
                        </div>`;
                });
                section.appendChild(grid);
            }
        }

        // ── Load Stats from Google Sheets ──
        async function loadStats() {
            try {
                const resp = await fetch(SHEETS_URL);
                const text = await resp.text();
                // Google Sheets JSON response is wrapped in a callback
                const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
                const rows = json.table.rows;
                const cols = json.table.cols;

                // Find column indices
                const headers = cols.map(c => (c.label || '').toString().trim());
                const ptsIdx = headers.findIndex(h => h === 'PTS' || h === 'Points');
                const rebIdx = headers.findIndex(h => h === 'REB' || h === 'Rebounds');
                const astIdx = headers.findIndex(h => h === 'AST' || h === 'Assists');

                if (ptsIdx === -1) throw new Error('PTS column not found');

                // Calculate averages across all games
                let totalPts = 0, totalReb = 0, totalAst = 0, games = 0;
                rows.forEach(row => {
                    const pts = row.c[ptsIdx] ? parseFloat(row.c[ptsIdx].v) : 0;
                    const reb = row.c[rebIdx] ? parseFloat(row.c[rebIdx].v) : 0;
                    const ast = row.c[astIdx] ? parseFloat(row.c[astIdx].v) : 0;
                    if (pts > 0 || reb > 0 || ast > 0) {
                        totalPts += pts;
                        totalReb += reb;
                        totalAst += ast;
                        games++;
                    }
                });

                if (games > 0) {
                    document.getElementById('valPPG').textContent = (totalPts / games).toFixed(1);
                    document.getElementById('valRPG').textContent = (totalReb / games).toFixed(1);
                    document.getElementById('valAPG').textContent = (totalAst / games).toFixed(1);
                }
            } catch (err) {
                console.warn('Could not load stats from Google Sheet:', err);
                // Show fallback stats
                document.getElementById('valPPG').textContent = '—';
                document.getElementById('valRPG').textContent = '—';
                document.getElementById('valAPG').textContent = '—';
            }
        }

        // ── Initialize ──
        loadVideos();
        loadStats();
    </script>
